# Postgres configuration for whichever node is currently the primary.
#
# Reachable via the Tailscale interface only — see the docker-compose port binding
# (`${TAILSCALE_IP}:5432:5432`). pg_hba.conf restricts replication peers further.

# --- Connection ----------------------------------------------------------
listen_addresses = '*'    # container only exposes the tailnet IP; safe to wildcard inside
port = 5432
max_connections = 100

# --- Memory --------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 8MB

# --- Write-ahead log / replication --------------------------------------
wal_level = replica
max_wal_senders = 5
max_replication_slots = 5
wal_keep_size = 1GB          # in case the replica is offline briefly
hot_standby = on             # harmless on primary; on by default in pg16

# --- Logging -------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_line_prefix = '%t [%p] %u@%d '
log_statement = 'ddl'
log_min_duration_statement = 1000   # log queries slower than 1s

# --- Autovacuum (defaults are fine; tune if write volume grows) ----------

# --- Misc ----------------------------------------------------------------
timezone = 'UTC'
log_timezone = 'UTC'
