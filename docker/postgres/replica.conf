# Postgres configuration for whichever node is currently the replica / hot standby.
#
# The data directory is bootstrapped with `pg_basebackup` from the primary (see
# docs/FAILOVER.md). `standby.signal` is written into the data dir to enable
# standby mode; `primary_conninfo` below is consumed via env var substitution
# at startup (Postgres 16 supports environment expansion).

listen_addresses = '*'
port = 5432
max_connections = 100

shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 64MB
work_mem = 8MB

# --- Replication (standby) ----------------------------------------------
hot_standby = on
hot_standby_feedback = on
primary_conninfo = 'host=${PRIMARY_TAILSCALE_IP} port=5432 user=replicator password=${REPLICATOR_PASSWORD} application_name=hrserv_replica'
# WAL retention: useful if we ever decide to flip B→A later.
wal_level = replica
max_wal_senders = 5
max_replication_slots = 5
wal_keep_size = 1GB

# --- Logging -------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_line_prefix = '%t [%p] %u@%d '
log_min_duration_statement = 1000

timezone = 'UTC'
log_timezone = 'UTC'
