# Host-based authentication for HRServ Postgres.
#
# The application (`hrserv` role) connects from the compose internal network.
# Replication (`replicator` role) connects from the peer node's tailnet IP only.
# No public-internet entries appear here — that's by design.
#
# !!! IMPORTANT: this file ships with placeholder IPs that DO NOT WORK. You
# !!! must substitute concrete tailnet addresses before Postgres will accept
# !!! replication. Use `scripts/configure_pg_hba.sh` (see Phase 2 checklist
# !!! step 13 in BOOTSTRAP.md). The placeholders are intentionally invalid so
# !!! a forgotten substitution fails LOUDLY rather than silently allowing the
# !!! whole CGNAT range.
#
# TYPE  DATABASE        USER           ADDRESS                 METHOD

local   all             all                                    trust
host    all             all            127.0.0.1/32            scram-sha-256
host    all             all            ::1/128                 scram-sha-256

# Application traffic from the docker compose bridge network. Docker's default
# bridge falls in 172.16.0.0/12; we deliberately do NOT include 10.0.0.0/8
# (that range overlaps with many home LANs and would broaden exposure if the
# container were ever bridged to host networking for debugging).
host    hrserv          hrserv         172.16.0.0/12           scram-sha-256

# Replication from the peer node over Tailscale. Replace the placeholder with
# the peer's actual /32 tailnet IP via `scripts/configure_pg_hba.sh`.
host    replication     replicator     REPLACE_WITH_PEER_TAILSCALE_IP/32  scram-sha-256
